[versions]
archunit = "1.4.2"
exposed = "1.3.0"
graalVmNativeImage = "1.1.1"
jandex = "2.3.0"
kotest = "6.1.11"
# Keep in sync with Quarkus
kotlin = "2.3.21"
kotlinxCoroutines = "1.11.0"
koburst = "0.7.1"
konsist = "0.17.3"
kratos = "26.2.0"
ktor = "3.5.0"
ktorPlugin = "3.5.0"
protoc = "4.35.0"
protobuf = "1.81.0"
protobufPlugin = "0.10.0"
grpcKotlin = "1.5.0"
quarkus-mockk = "3.1.0"
moneta = "1.4.5"
openskill = "1.0.0"
quarkus = "3.35.3"

[libraries]
archunit = { module = "com.tngtech.archunit:archunit", version.ref = "archunit" }
exposed-core = { module = "org.jetbrains.exposed:exposed-core", version.ref = "exposed" }
exposed-java-time = { module = "org.jetbrains.exposed:exposed-java-time", version.ref = "exposed" }
exposed-jdbc = { module = "org.jetbrains.exposed:exposed-jdbc", version.ref = "exposed" }
flyway-database-postgresql = { module = "org.flywaydb:flyway-database-postgresql" }
grpc-kotlin-stub = { module = "io.grpc:grpc-kotlin-stub", version.ref = "grpcKotlin" }
grpc-netty = { module = "io.grpc:grpc-netty", version.ref = "protobuf" }
grpc-protobuf = { module = "io.grpc:grpc-protobuf", version.ref = "protobuf" }
