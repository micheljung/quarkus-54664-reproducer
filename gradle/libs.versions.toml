quarkus-agroal = { module = "io.quarkus:quarkus-agroal" }
quarkus-arc = { module = "io.quarkus:quarkus-arc" }
quarkus-cache = { module = "io.quarkus:quarkus-cache" }
quarkus-config-yaml = { module = "io.quarkus:quarkus-config-yaml" }
quarkus-container-image-jib = { module = "io.quarkus:quarkus-container-image-jib" }
quarkus-flyway = { module = "io.quarkus:quarkus-flyway" }
quarkus-google-cloud-firebase-admin = { module = "io.quarkiverse.googlecloudservices:quarkus-google-cloud-firebase-admin" }
#quarkus-google-cloud-services-bom = { module = "io.quarkus.platform:quarkus-google-cloud-services-bom", version.ref = "quarkus" }
# TODO temporarily, until io.quarkus.platform:quarkus-google-cloud-services-bom is updated
quarkus-google-cloud-services-bom = { module = "io.quarkiverse.googlecloudservices:quarkus-google-cloud-services-bom", version = "2.21.0" }
quarkus-gradle-plugin = { module = "io.quarkus:gradle-application-plugin", version.ref = "quarkus" }
quarkus-grpc = { module = "io.quarkus:quarkus-grpc" }
quarkus-jacoco = { module = "io.quarkus:quarkus-jacoco" }
quarkus-jdbc-postgresql = { module = "io.quarkus:quarkus-jdbc-postgresql" }
quarkus-junit5 = { module = "io.quarkus:quarkus-junit5" }
quarkus-kotlin = { module = "io.quarkus:quarkus-kotlin" }
quarkus-logging-json = { module = "io.quarkus:quarkus-logging-json" }
quarkus-mockk = { module = "io.quarkiverse.mockk:quarkus-junit5-mockk", version.ref = "quarkus-mockk" }
quarkus-micrometer-registry-prometheus = { module = "io.quarkus:quarkus-micrometer-registry-prometheus" }
quarkus-platform-bom = { module = "io.quarkus.platform:quarkus-bom", version.ref = "quarkus" }
quarkus-rest = { module = "io.quarkus:quarkus-rest" }
quarkus-rest-client-jackson = { module = "io.quarkus:quarkus-rest-client-jackson" }
quarkus-scheduler = { module = "io.quarkus:quarkus-scheduler" }
quarkus-security = { module = "io.quarkus:quarkus-security" }
quarkus-smallrye-context-propagation = { module = "io.quarkus:quarkus-smallrye-context-propagation" }
quarkus-reactive-pgClient = { module = "io.quarkus:quarkus-reactive-pg-client" }
quarkus-vertx-http = { module = "io.quarkus:quarkus-vertx-http" }
quarkus-vertx = { module = "io.quarkus:quarkus-vertx" }
smallrye-reactive-mutiny = { module = "io.smallrye.reactive:mutiny" }
mutiny-kotlin = { module = "io.smallrye.reactive:mutiny-kotlin"}
testcontainers = { module = "org.testcontainers:testcontainers" }
vertx-junit5 = { module = "io.vertx:vertx-junit5" }
vertx-lang-kotlin-coroutines = { module = "io.vertx:vertx-lang-kotlin-coroutines" }

[plugins]
kotest = { id = "io.kotest", version.ref = "kotest" }
kotlin-allopen = { id = "org.jetbrains.kotlin.plugin.allopen", version.ref = "kotlin" }
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
ktor = { id = "io.ktor.plugin", version.ref = "ktorPlugin" }
graalVm-nativeImage = { id = "org.graalvm.buildtools.native", version.ref = "graalVmNativeImage" }
quarkus = { id = "io.quarkus", version.ref = "quarkus" }
protobuf = { id = "com.google.protobuf", version.ref = "protobufPlugin" }

[bundles]
kotest = ["kotest-assertions-core-jvm", "kotest-extensions-junitxml", "kotest-runner-junit5"]
exposed = ["exposed-core", "exposed-jdbc", "exposed-java-time"]
